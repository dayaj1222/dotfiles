# ══════════════════════════════════════════════════════════════════════════════
#  HYPRLAND CONFIGURATION
#  Elegant · Functional · Minimal
# ══════════════════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────────────────
#  Pywal Color Scheme
# ──────────────────────────────────────────────────────────────────────────────

source = ~/.cache/wal/colors-hyprland.conf
env = QT_QPA_PLATFORMTHEME,hyprqt6engine

# ──────────────────────────────────────────────────────────────────────────────
#  Monitors
# ──────────────────────────────────────────────────────────────────────────────

monitor = eDP-1, 1920x1080, 0x0, 1


# ──────────────────────────────────────────────────────────────────────────────
#  Default Applications
# ──────────────────────────────────────────────────────────────────────────────

$term          = kitty
$browser       = brave
$fileManager   = kitty --class floating -e yazi
$sysMonitor    = kitty --class btop -e btop
$editor        = kitty --class neovim -e nvim
$music         = kitty --class floating -e termusic
$menu          = fuzzel


# ──────────────────────────────────────────────────────────────────────────────
#  Autostart
# ──────────────────────────────────────────────────────────────────────────────

# Clipboard manager
exec-once = wl-paste --watch cliphist store

# Eye Protection
exec-once = hyprsunset

# Idle
exec-once = hypridle

# Polkit agent
exec-once = systemctl --user start hyprpolkitagent

# Wallpaper via swaybg - read from wal's state
exec-once = swaybg -i "$(cat ~/.cache/wal/wal)"

# Notifications
exec-once = mako --config ~/.cache/wal/mako

# Status bar
exec-once = waybar

# GTK theming
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-blue-standard+default'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# DBus / portal environment
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP=Hyprland GTK_USE_PORTAL=1


# ──────────────────────────────────────────────────────────────────────────────
#  Environment Variables
# ──────────────────────────────────────────────────────────────────────────────

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# ──────────────────────────────────────────────────────────────────────────────
#  Look and Feel
# ──────────────────────────────────────────────────────────────────────────────

general {
    gaps_in      = 2
    gaps_out     = 6
    border_size  = 2

    col.active_border   = $color5 $color13 45deg
    col.inactive_border = $color8

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 4
    rounding_power = 5

    active_opacity   = 1.0
    inactive_opacity = 0.96

    shadow {
        enabled      = false
        range        = 8
        render_power = 3
        color        = $color0
    }

    blur {
        enabled    = true
        size       = 5
        passes     = 2
        vibrancy   = 0.17
        new_optimizations = true
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = linear,       0,    0, 1,    1
    bezier = quick,        0.15, 0, 0.1,  1

    animation = global,        1, 10,  default
    animation = border,        1, 3,   easeOutQuint
    animation = windows,       1, 3,   easeOutQuint
    animation = windowsIn,     1, 3,   easeOutQuint, popin 87%
    animation = windowsOut,    1, 2,   quick,        popin 87%
    animation = fade,          1, 2,   quick
    animation = fadeIn,        1, 2,   quick
    animation = fadeOut,       1, 1.5, quick
    animation = layers,        1, 3,   easeOutQuint
    animation = layersIn,      1, 3,   easeOutQuint, fade
    animation = layersOut,     1, 1.5, quick,        fade
    animation = workspaces,    1, 3,   easeOutQuint, slide
    animation = workspacesIn,  1, 3,   easeOutQuint, slide
    animation = workspacesOut, 1, 2,   quick,        slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}


# ──────────────────────────────────────────────────────────────────────────────
#  Input
# ──────────────────────────────────────────────────────────────────────────────

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        disable_while_typing = true
        drag_lock         = false
        scroll_factor     = 1.0
    }
}

gesture = 3, horizontal, workspace



# ══════════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
# ══════════════════════════════════════════════════════════════════════════════

$mainMod = SUPER


# ──────────────────────────────────────────────────────────────────────────────
#  Basic Controls
# ──────────────────────────────────────────────────────────────────────────────

bind = $mainMod,       Return,      exec,           $term
bind = $mainMod SHIFT, Return,      exec,           kitty --class floating
bind = $mainMod,       B,           exec,           $browser
bind = $mainMod,       E,           exec,           $editor
bind = $mainMod,       N,           exec,           $fileManager
bind = $mainMod,       Q,           killactive
bind = $mainMod SHIFT, M,           exec,           $sysMonitor
bind = $mainMod,       M,           exec,           $music

# Launcher
bind = $mainMod,       Space,       exec,           $menu

# Notifications
bind = CTRL,           Space,       exec,           makoctl dismiss

# Reload / Exit
bind = $mainMod,       R,           exec,           hyprctl reload
bind = $mainMod SHIFT, R,           exit

# Floating modifier
bind = $mainMod,       S,           togglefloating
bind = $mainMod SHIFT, S,           exec,           hyprctl dispatch focusurgentorlast

# Power menu
bind = $mainMod SHIFT, E,           exec,           $HOME/.dotfiles/scripts/power-menu.sh

# Copilot terminal
bind = $mainMod,       C,           exec,           kitty --class copilot-kitty -e copilot --resume

# Waybar toggle
bind = $mainMod ALT,   W,           exec,           $HOME/.dotfiles/scripts/waybar-toggle.sh

# Fullscreen
bind = $mainMod,       F,           fullscreen


# ──────────────────────────────────────────────────────────────────────────────
#  Focus Navigation (Vim + Arrow keys)
# ──────────────────────────────────────────────────────────────────────────────

bind = $mainMod, H,     movefocus, l
bind = $mainMod, J,     movefocus, d
bind = $mainMod, K,     movefocus, u
bind = $mainMod, L,     movefocus, r

bind = $mainMod, left,  movefocus, l
bind = $mainMod, down,  movefocus, d
bind = $mainMod, up,    movefocus, u
bind = $mainMod, right, movefocus, r


# ──────────────────────────────────────────────────────────────────────────────
#  Window Movement (Vim + Arrow keys)
# ──────────────────────────────────────────────────────────────────────────────

bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, L,     movewindow, r

bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, right, movewindow, r


# ──────────────────────────────────────────────────────────────────────────────
#  Window Resizing
# ──────────────────────────────────────────────────────────────────────────────

binde = $mainMod ALT, H, resizeactive, -20 0
binde = $mainMod ALT, J, resizeactive, 0 20
binde = $mainMod ALT, K, resizeactive, 0 -20
binde = $mainMod ALT, L, resizeactive, 20 0

# Mouse resize/move
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# ──────────────────────────────────────────────────────────────────────────────
#  Workspace Management
# ──────────────────────────────────────────────────────────────────────────────

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1


# ──────────────────────────────────────────────────────────────────────────────
#  Scratchpad
# ──────────────────────────────────────────────────────────────────────────────

bind = $mainMod SHIFT, minus, movetoworkspacesilent,    special:scratchpad
bind = $mainMod,       minus, togglespecialworkspace, scratchpad


# ──────────────────────────────────────────────────────────────────────────────
#  Media & Hardware Keys
# ──────────────────────────────────────────────────────────────────────────────

bindel = , XF86AudioRaiseVolume,  exec, $HOME/.dotfiles/scripts/volume-up.sh
bindel = , XF86AudioLowerVolume,  exec, $HOME/.dotfiles/scripts/volume-down.sh
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioPlay, exec, playerctl -p spotify play-pause
bindl = , XF86AudioNext, exec, playerctl -p spotify next
bindl = , XF86AudioPrev, exec, playerctl -p spotify previous

# Do Not Disturb
bind = $mainMod,       D, exec, sh -c "notify-send ' Do Not Disturb' 'Turning on Do Not Disturb Mode' && sleep 2 && makoctl set-mode do-not-disturb"
bind = $mainMod SHIFT, D, exec, sh -c "makoctl set-mode default && notify-send ' Do Not Disturb' 'Do Not Disturb Mode disabled'"


# ──────────────────────────────────────────────────────────────────────────────
#  Screenshot & Utilities
# ──────────────────────────────────────────────────────────────────────────────

bind = ,            Print, exec, $HOME/.dotfiles/scripts/screenshot.sh
bind = $mainMod,    Print, exec, $HOME/.dotfiles/scripts/screenshot.sh -f

# Clipboard
bind = $mainMod,       V, exec, cliphist list | fuzzel --dmenu --prompt "Clipboard: " | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist wipe

# Emoji picker
bind = $mainMod, period, exec, $HOME/.dotfiles/scripts/emoji-picker.sh

# Wallpaper
bind = $mainMod,       W, exec, $HOME/.dotfiles/scripts/wallpaper.sh
bind = $mainMod SHIFT, W, exec, $HOME/.dotfiles/scripts/wallpaper.sh -r

# Color picker
bind = $mainMod, P, exec, $HOME/.dotfiles/scripts/colorpicker.sh

# Caffeine
bind = $mainMod SHIFT, C, exec, $HOME/.dotfiles/scripts/caffeine-toggle.sh toggle


# ══════════════════════════════════════════════════════════════════════════════
#  WINDOW RULES
# ══════════════════════════════════════════════════════════════════════════════

# Suppress maximize requests
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland dragging
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Spotify
windowrule {
    name = spotify-float
    match:class = Spotify
    float = yes
    size = 1050 650
    move = 15 15
    border_size = 3
}

# Thunar
windowrule {
    name = Thunar
    match:class = thunar
    float = yes
    size = 1000 700
    move = center
    border_size = 2
}

# MPV
windowrule {
    name = mpv
    match:class = mpv
    float = yes
    size = 1000 700
    move = center
    border_size = 2
}

# Swappy (screenshot editor)
windowrule {
    name = swappy-float
    match:class = swappy
    float = yes
    move = center
    border_size = 2
}

# feh (image viewer)
windowrule {
    name = feh-float
    match:class = feh
    float = yes
    size = 1000 700
    move = center
    border_size = 2
}

# Veracrypt
windowrule {
    name = veracrypt-float
    match:class = veracrypt
    float = yes
    border_size = 3
}

# Python GUI apps
windowrule {
    name = python3-float
    match:class = python3
    float = yes
    border_size = 3
}

# Pavucontrol
windowrule {
    name = Pavucontrol
    match:class = org.pulseaudio.pavucontrol
    float = yes
    size = 800 600
    move = center
    border_size = 2
}

# Generic floating class (kitty --class floating)
windowrule {
    name = floating-class
    match:class = floating
    float = yes
    size = 1000 700
    move = center
    border_size = 2
}

# Copilot side panel
windowrule {
    name = copilot-kitty-panel
    match:class = copilot-kitty
    float = yes
    size = 500 990
    move = 1402 70
}

# nmtui network manager
windowrule {
    name = nmtui-float
    match:title = nmtui
    float = yes
    move = center
    workspace = 99
}

# Zathura PDF viewer
windowrule {
    name = MComix
    match:class = MComix
    float = yes
    size = 1200 800
    move = center
    border_size = 2
}

# Transmission
windowrule {
    name = transmission-float
    match:class = .*transmission.*
    float = yes
    size = 800 600
    move = center
    border_size = 2
}
# nwg-look
windowrule {
        name = nwg-look
        match:class = nwg-look
        float = yes
        size = 800 600
        move = centre
    }

# Kvantummanager
windowrule {
        name = Kvantummanager
        match:class = kvantummanager
        float = yes
        size = 800 600
        move = centre
    }


# ══════════════════════════════════════════════════════════════════════════════
#  End of Configuration
# ══════════════════════════════════════════════════════════════════════════════
