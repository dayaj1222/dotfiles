# ──────────────────────────────────────────────────────────────────────────────
#  HYPRLOCK CONFIGURATION
#  Pywal themed
# ──────────────────────────────────────────────────────────────────────────────

source = ~/.cache/wal/colors-hyprland.conf

background {
    monitor =
    path = $wallpaper

    blur_passes = 3
    blur_size = 5
    brightness = 0.6
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2

    outer_color = $color5
    inner_color = $color0
    font_color = $foreground
    check_color = $color13
    fail_color = $color1

    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $foreground
    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $color6
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 100
    halign = center
    valign = center
}
